plugin_id: telecom.order
name: 电信下单插件
version: 0.1.0
sdk_version: 0.1.0
kind: capability
enabled: true
owner: telecom
summary: 承载订购限制校验、预下单、验证码、提交订单、支付确认等能力
compatibility:
  core: ">=0.1.0,<1.0.0"
exports:
  tools:
    - check_order_restrictions
    - preview_order
    - request_order_sms_code
    - submit_order
    - confirm_order_payment
    - query_orders
  cards:
    - order_preview
    - order_verify
    - order_list
    - payment
    - payment_result
  skills:
    - order
dependencies:
  plugins:
    - global.base
    - global.knowledge
    - telecom.recommend
  global_tools:
    - load_skills
    - search_knowledge
